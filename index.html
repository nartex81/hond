<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zorghond Mollie — Gidsen &amp; tools</title>
<meta name="theme-color" content="#1F3F37">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
<style>
  a{text-decoration:none;color:inherit;}

  /* ---- Masthead ---- */
  header{
    background:var(--diepgroen);color:var(--papier);text-align:center;
    padding:64px 24px 76px;position:relative;overflow:hidden;
    border-bottom:4px solid var(--mollie-goud);
  }
  /* zachte gouden gloed bovenin */
  header::before{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 50% -10%, rgba(223,163,60,0.30), transparent 62%);}
  /* subtiele hoeklijnen als kader (stempel-gevoel) */
  header::after{content:"";position:absolute;left:22px;right:22px;top:22px;bottom:22px;
    border:1px solid rgba(223,163,60,0.22);border-radius:14px;pointer-events:none;}
  header .inner{position:relative;z-index:1;}

  .crest{
    width:84px;height:84px;border-radius:50%;margin:0 auto 18px;
    border:3px dashed var(--mollie-goud);display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,rgba(251,247,238,0.10) 55%,rgba(223,163,60,0.18) 100%);
    font-size:2.2rem;box-shadow:inset 0 0 0 6px rgba(223,163,60,0.10);
  }
  header .brand{font-size:0.72rem;letter-spacing:.20em;text-transform:uppercase;color:var(--mollie-goud);font-weight:800;margin-bottom:14px;}

  /* het woordmerk */
  .wordmark{
    font-family:'Fraunces',serif;font-weight:900;color:var(--papier);
    font-size:clamp(2.6rem, 9vw, 4.2rem);line-height:1;letter-spacing:-0.01em;
  }
  .wordmark .dot{color:var(--mollie-goud);}

  /* scheidingslijn met pootje */
  .rule{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px auto 0;max-width:280px;}
  .rule .line{flex:1;height:1px;background:linear-gradient(to right, transparent, rgba(223,163,60,0.6));}
  .rule .line.left{background:linear-gradient(to left, transparent, rgba(223,163,60,0.6));}
  .rule .paw{color:var(--mollie-goud);font-size:0.95rem;flex:0 0 auto;}

  header .tagline{color:var(--zacht-goud);font-style:italic;font-family:'Fraunces',serif;font-size:clamp(1rem,3.5vw,1.2rem);margin-top:14px;}

  /* ---- Grid ---- */
  .wrap{max-width:900px;margin:0 auto;padding:0 20px;}
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;
    margin-top:-36px;position:relative;z-index:2;padding-bottom:8px;
  }
  .tile{
    background:#fff;border:1px solid var(--zachtgroen);border-radius:18px;padding:22px 20px;
    display:flex;flex-direction:column;gap:10px;position:relative;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    box-shadow:0 4px 14px rgba(31,63,55,0.06);
  }
  .tile:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(31,63,55,0.13);border-color:var(--mollie-goud);}
  .tile:active{transform:translateY(-1px);}
  .tile .icon{
    width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;background:var(--zachtgroen);
  }
  .tile h3{font-size:1.2rem;}
  .tile p{font-size:0.88rem;line-height:1.45;color:#5f574b;flex:1;}
  .tile .go{display:flex;align-items:center;gap:6px;font-weight:800;font-size:0.85rem;color:var(--bosgroen);}
  .tile .go .arrow{transition:transform .16s ease;}
  .tile:hover .go .arrow{transform:translateX(4px);}
  .badge{
    position:absolute;top:16px;right:16px;font-size:0.62rem;font-weight:800;letter-spacing:.04em;
    text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--stempelrood);color:#fff;
  }

  footer{text-align:center;padding:34px 20px 40px;font-size:0.8rem;color:#8a8071;}
  footer .paw{color:var(--mollie-goud);}

  @media (max-width:520px){
    header{padding:44px 20px 56px;}
    header h1{font-size:1.7rem;}
    .grid{grid-template-columns:1fr;}
  }
  /* ---- Suggestie-knop ---- */
  .suggest{
    max-width:900px;margin:26px auto 0;padding:0 20px;text-align:center;
  }
  .suggest .card{
    background:#fff;border:1px solid var(--zachtgroen);border-radius:18px;
    padding:24px 22px;box-shadow:0 4px 14px rgba(31,63,55,0.06);
  }
  .suggest h2{font-size:1.25rem;margin-bottom:6px;}
  .suggest p{font-size:0.9rem;color:#5f574b;line-height:1.5;margin-bottom:16px;}
  .suggest .btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--mollie-goud);color:var(--inkt);text-decoration:none;
    font-weight:800;font-size:0.98rem;padding:13px 24px;border-radius:999px;
    box-shadow:0 6px 16px rgba(223,163,60,0.28);transition:transform .15s ease, background .15s ease;
  }
  .suggest .btn:hover{background:#c98f2c;transform:translateY(-2px);}
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="crest" aria-hidden="true">🐾</div>
    <div class="brand">Zorghond Mollie</div>
    <div class="wordmark">hondmee<span class="dot">.be</span></div>
    <div class="rule" aria-hidden="true"><span class="line left"></span><span class="paw">🐾</span><span class="line"></span></div>
    <div class="tagline">short legs, big love</div>
  </div>
</header>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- ===================================================================
     SUGGESTIE-KNOP
     De link opent een nieuwe "issue" op github.com/nartex81/hond
     met een kant-en-klaar sjabloon. Andere repo? Pas de naam in de
     href hieronder aan.
     =================================================================== -->
<div class="suggest">
  <div class="card">
    <h2>💬 Heb je een suggestie?</h2>
    <p>Zie je een fout in de gegevens, of heb je een idee om deze gidsen beter te maken? Laat het ons weten — alle tips zijn welkom.</p>
    <a class="btn"
       href="https://github.com/nartex81/hond/issues/new?title=Suggestie%20voor%20de%20hondengids&body=Wat%20wil%20je%20aanvullen%20of%20verbeteren%3F%0A%0A(Beschrijf%20hier%20je%20suggestie%20of%20de%20fout%20die%20je%20zag.)"
       target="_blank" rel="noopener">
      🐾 Stuur een suggestie
    </a>
  </div>
</div>

<footer><span class="paw" aria-hidden="true">🐾</span> Zorghond Mollie · hondmee.be</footer>

<script>
/* =====================================================================
   HIER PAS JE DE LINKS AAN
   ---------------------------------------------------------------------
   Voeg een link toe door een blok te kopiëren en aan te passen.
   Elk blok heeft:
     emoji  : het icoontje (elk emoji mag)
     titel  : de naam van de pagina
     tekst  : korte omschrijving
     url    : link naar de pagina (bestandsnaam of volledige https-link)
     badge  : (optioneel) klein labeltje, bv. "Nieuw" — laat weg of "" voor geen badge

   Interne links (bestand in dezelfde map) openen in hetzelfde tabblad,
   externe links (beginnend met http) openen in een nieuw tabblad.
   ===================================================================== */
const LINKS = [
  {
    emoji: "📍",
    titel: "Hondvriendelijke plekken",
    tekst: "Ontdek losloopzones, bossen, hondvriendelijke terrasjes en winkels in de Kempen — gecheckt door Mollie.",
    url:   "hondvriendelijke-plekken.html",
    badge: "Nieuw"
  },
  {
    emoji: "🗺️",
    titel: "Honden op het strand",
    tekst: "Waar, wanneer en hoe honden welkom zijn op de stranden van België, Zeeland en Zuid-Holland.",
    url:   "honden-stranden.html",
    badge: ""
  },
  {
    emoji: "🌤️",
    titel: "Wandelweer",
    tekst: "Geef een locatie in en zie het beste moment van vandaag om met de hond te wandelen.",
    url:   "wandelweer.html",
    badge: ""
  },
  {
    emoji: "📱",
    titel: "Wandelweer (app)",
    tekst: "Dezelfde wandelweer-gids in een app-vorm. Voeg toe aan je beginscherm voor full-screen gebruik.",
    url:   "wandelweer-app.html",
    badge: "App"
  },
  {
    emoji: "🎂",
    titel: "Hoe oud is je hond?",
    tekst: "Bereken de leeftijd van je hond in mensenjaren — op maat van de grootte van je hond.",
    url:   "hondenleeftijd.html",
    badge: ""
  },

  /* --- Kopieer dit blok voor een nieuwe link ---
  {
    emoji: "🐕",
    titel: "Titel van je pagina",
    tekst: "Korte omschrijving die op de kaart verschijnt.",
    url:   "jouw-pagina.html",
    badge: ""
  },
  ------------------------------------------------ */
];

/* ---- Render (hier hoef je niets aan te passen) ---- */
const grid = document.getElementById('grid');
LINKS.forEach(link => {
  const isExternal = /^https?:\/\//i.test(link.url);
  const a = document.createElement('a');
  a.className = "tile";
  a.href = link.url;
  if(isExternal){ a.target = "_blank"; a.rel = "noopener"; }
  a.innerHTML = `
    ${link.badge ? `<span class="badge">${link.badge}</span>` : ""}
    <div class="icon">${link.emoji || "🔗"}</div>
    <h3>${link.titel || "Zonder titel"}</h3>
    <p>${link.tekst || ""}</p>
    <div class="go">Openen <span class="arrow">›</span></div>
  `;
  grid.appendChild(a);
});
</script>
</body>
</html>
